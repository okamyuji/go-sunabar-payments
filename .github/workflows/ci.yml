name: ci

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # 毎日 03:00 UTC ( JST 12:00 ) に履歴全体を再スキャンして既存リーク検出を継続。
    - cron: "0 3 * * *"

permissions:
  contents: read

jobs:
  # gitleaks による秘密情報スキャン（fetch-depth: 0 で履歴全体、GITHUB_TOKEN 内蔵）。
  # .gitleaks.toml はリポジトリ直下にあるため gitleaks が自動検出する。
  security:
    uses: okamyuji/reusable-workflows/.github/workflows/security-scan.yml@v1

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: go fmt check
        run: |
          set -euo pipefail
          out="$(gofmt -l .)"
          if [ -n "$out" ]; then
            echo "gofmt diff:" && echo "$out"
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: latest
          install-go: false
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.1

  # go vet / go build / ユニットテスト（-short）。Go バージョンは go.mod から解決する。
  ci:
    uses: okamyuji/reusable-workflows/.github/workflows/go-ci.yml@v1
    with:
      test-command: "go test -race -shuffle=on -count=1 -short ./..."

  integration:
    name: integration test (MySQL)
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: payments
          MYSQL_USER: app
          MYSQL_PASSWORD: app
          TZ: Asia/Tokyo
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: integration tests
        env:
          INTEGRATION_DB_DSN: app:app@tcp(127.0.0.1:3306)/payments?parseTime=true&loc=Asia%2FTokyo&multiStatements=true
        # 共有 MySQL を使うため、 パッケージ並列度を 1 に固定して resetSchema/applyMigrations の競合を防ぐ。
        run: go test -race -shuffle=on -count=1 -p 1 -tags=integration -timeout=10m ./...
