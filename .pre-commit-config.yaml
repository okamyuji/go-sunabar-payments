repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
        # .gitleaks.toml ( allowlist + sunabar 固有ルール ) を必ず読ませる。
        args: ["--redact", "--no-banner", "--config", ".gitleaks.toml"]
  - repo: local
    hooks:
      - id: ci-tooling-check
        name: CI tooling compatibility
        entry: bash scripts/check-ci-tooling.sh
        language: system
        pass_filenames: false
        files: ^(\.github/workflows/ci\.yml|scripts/check-ci-tooling\.sh|\.pre-commit-config\.yaml|\.githooks/pre-commit|Makefile)$
